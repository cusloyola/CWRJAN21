worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    upstream django {
        server cwr_backend_dev:8000;
    }

    upstream react {
        server cwr_frontend_dev:3000;
    }

    server {
        listen 80;

        # --------------------------
        # React dev server (CWR)
        # --------------------------
        location / {
            proxy_pass http://cwr_frontend_dev:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # --------------------------
        # Django API
        # --------------------------
        location /api/ {
            proxy_pass http://cwr_backend_dev:8000;
            proxy_set_header Host $host;
        }

        # --------------------------
        # Django Admin
        # --------------------------
        location /admin/ {
            proxy_pass http://cwr_backend_dev:8000;
            proxy_set_header Host $host;
        }
        # --------------------------
        # Reports (ReportLab Service)
        # --------------------------
        location /reports/ {
            proxy_pass http://report;
            proxy_set_header Host $host;
        }

        # --------------------------
        # Media
        # --------------------------
        location /media/ {
            proxy_pass http://cwr_backend_dev:8000;
        }
        
        # --------------------------
        # Static
        # --------------------------
        location /static/ {
            proxy_pass http://cwr_backend_dev:8000;
        }
        
    }
}
