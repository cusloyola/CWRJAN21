worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # --------------------------
    # Upstreams (API Gateway Targets)
    # --------------------------
    upstream backend {
        server cwr_backend_dev:8000;
    }

    upstream frontend {
        server cwr_frontend_dev:3000;
    }

    upstream report_service {
        server report_service:8001;
    }

    server {
        listen 80;

        # --------------------------
        # React (Vite Dev Server)
        # --------------------------
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # WebSocket (HMR support)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
        }

        # --------------------------
        # Django API
        # --------------------------
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --------------------------
        # Django Admin
        # --------------------------
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
        # --------------------------
        # Reports (ReportLab Service)
        # --------------------------
        location /reports/ {
            proxy_pass http://report_service;
            proxy_set_header Host $host;
        }

        # --------------------------
        # Media
        # --------------------------
        location /media/ {
            proxy_pass http://backend;
        }

        # --------------------------
        # Static
        # --------------------------
        location /static/ {
            proxy_pass http://backend;
        }
        
        # --------------------------
        # Optional: Health check endpoint
        # --------------------------
        location /health/ {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

    }
}
