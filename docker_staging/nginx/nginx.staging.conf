

    upstream django {
        server cwr_backend_staging:8000;
    }

    # ---------------------------------
    # HTTP → redirect to HTTPS
    # ---------------------------------
    server {
        listen 80;
        server_name stagingcwr.local;

        return 301 https://$host$request_uri;
    }

    # ---------------------------------
    # HTTPS
    # ---------------------------------

    server {
        listen 443 ssl;
        server_name stagingcwr.local;

        ssl_certificate     /etc/nginx/ssl/stagingcwr.pem;
        ssl_certificate_key /etc/nginx/ssl/stagingcwr-key.pem;

        root /usr/share/nginx/html;
        index index.html;

        # SPA routing
        location / {
            try_files $uri /index.html;
        }

        # API proxy
        location /api/ {
            proxy_pass http://cwr_backend_staging:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin panel proxy
        location /admin/ {
            proxy_pass http://cwr_backend_staging:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Media
        location /media/ {
            proxy_pass http://cwr_backend_staging:8000;
        }
    }

