name: cwr_v1_staging

services:
  # --------------------------
  # Redis - Celery Broker
  # --------------------------
  redis:
    build:
      context: ..
      dockerfile: docker_staging/staging.redis.Dockerfile
    container_name: cwr_redis_staging
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # --------------------------
  # Celery Worker
  # --------------------------
  celery_worker:
    build:
      context: ..
      dockerfile: docker_staging/staging.backend.Dockerfile
    container_name: cwr_celery_worker_staging
    command: python -m celery -A server.celery:app worker --loglevel=info
    env_file:
      - ../backend/.env.staging
    environment:
      DB_HOST: db
      ENVIRONMENT: staging
    depends_on:
      - db
      - redis
    volumes:
      - ../media_data:/app/media
    networks:
      - app_network
    restart: always

  # --------------------------
  # Celery Beat
  # --------------------------
  celery_beat:
    build:
      context: ..
      dockerfile: docker_staging/staging.backend.Dockerfile
    container_name: cwr_celery_beat_staging
    command: python -m celery -A server.celery:app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file:
      - ../backend/.env.staging
    environment:
      DB_HOST: db
      ENVIRONMENT: staging
    depends_on:
      - db
      - redis
    volumes:
      - ../media_data:/app/media
    networks:
      - app_network
    restart: always

  # --------------------------
  # Database - MariaDB
  # --------------------------
  db:
    build:
      context: ..
      dockerfile: docker_staging/staging.db.Dockerfile
    image: cwr_v1_staging_mariadb:latest
    container_name: cwr_db_staging
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: cwr_db
      MARIADB_USER: user
      MARIADB_PASSWORD: userpassword
      TZ: Asia/Manila 
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  # --------------------------
  # Frontend - React
  # --------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker_staging/staging.frontend.Dockerfile
    container_name: cwr_frontend_staging
    working_dir: /app
    volumes:
      - ../media_data:/usr/share/nginx/html/media
      - ../backend/staticfiles:/usr/share/nginx/html/static  # <- serve static
      - ../docker_staging/certs:/etc/nginx/ssl  # <-- mount certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - app_network
    restart:  always

  # --------------------------
  # Backend - Django
  # --------------------------
  backend:
    build:
      context: ..
      dockerfile: docker_staging/staging.backend.Dockerfile
    env_file:
      - ../backend/.env.staging
    container_name: cwr_backend_staging
    environment:
      DB_HOST: db   # override host for Docker
      ENVIRONMENT: staging
    depends_on:
      - db
    volumes:
      - ../backend:/app
      - ../media_data:/app/media
      - ../backend/staticfiles:/app/staticfiles  # <- for admin CSS/JS
    ports:
      - "8000:8000"
    networks:
      - app_network
    restart: always
 
networks:
  app_network:
    driver: bridge

volumes:
  node_modules_cache:
  db_data:
  redis_data: